name: Build & Deploy — ai-service

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  attestations: write
  packages: write

env:
  SERVICE: ai-service
  SERVICE_DIR: fanvault-ai-service
  AWS_REGION: us-east-1

jobs:
  # ── PR Gate: scan only, no push ───────────────────────────────────────────
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: false
          load: true
          tags: ${{ env.SERVICE }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  # ── Dev Deploy: push to main → ECR dev → update gitops dev ────────────────
  build-and-deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | head -c7)
          IMAGE_TAG="sha-${SHORT_SHA}"
          ECR_REPO_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/fanvault-dev-${{ env.SERVICE }}"
          echo "image_tag=${IMAGE_TAG}"       >> $GITHUB_OUTPUT
          echo "ecr_repo_uri=${ECR_REPO_URI}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build image for scanning (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: false
          load: true
          tags: ${{ env.SERVICE }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (gate — fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Push to ECR
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: true
          tags: ${{ steps.vars.outputs.ecr_repo_uri }}:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.vars.outputs.ecr_repo_uri }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Update GitOps repo (dev)
        env:
          ECR_REPO_URI: ${{ steps.vars.outputs.ecr_repo_uri }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/Savitxr/fanvault-gitops.git
          cd fanvault-gitops

          wget -q https://github.com/mikefarah/yq/releases/download/v4.44.2/yq_linux_amd64 \
            -O /usr/local/bin/yq && chmod +x /usr/local/bin/yq

          yq e '.image.repository = env(ECR_REPO_URI)' -i environments/dev/values-ai.yaml
          yq e '.image.tag = env(IMAGE_TAG)'           -i environments/dev/values-ai.yaml

          git config user.email "ci@fanvault.internal"
          git config user.name "FanVault CI"
          git add environments/dev/values-ai.yaml
          git diff --staged --quiet || git commit -m "ci: update ai-service to ${IMAGE_TAG} [skip ci]"
          git push

      - name: Deployment summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.vars.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | ${{ steps.push.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY

  # ── Prod Deploy: v* tag → ECR prod → update gitops prod (approval required) ─
  build-and-deploy-prod:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME}"
          ECR_REPO_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/fanvault-prod-${{ env.SERVICE }}"
          echo "image_tag=${IMAGE_TAG}"       >> $GITHUB_OUTPUT
          echo "ecr_repo_uri=${ECR_REPO_URI}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build image for scanning (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: false
          load: true
          tags: ${{ env.SERVICE }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (gate — fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Push to ECR
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: true
          tags: ${{ steps.vars.outputs.ecr_repo_uri }}:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.vars.outputs.ecr_repo_uri }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Update GitOps repo (prod)
        env:
          ECR_REPO_URI: ${{ steps.vars.outputs.ecr_repo_uri }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/Savitxr/fanvault-gitops.git
          cd fanvault-gitops

          wget -q https://github.com/mikefarah/yq/releases/download/v4.44.2/yq_linux_amd64 \
            -O /usr/local/bin/yq && chmod +x /usr/local/bin/yq

          yq e '.image.repository = env(ECR_REPO_URI)' -i environments/prod/values-ai.yaml
          yq e '.image.tag = env(IMAGE_TAG)'           -i environments/prod/values-ai.yaml

          git config user.email "ci@fanvault.internal"
          git config user.name "FanVault CI"
          git add environments/prod/values-ai.yaml
          git diff --staged --quiet || git commit -m "ci: promote ai-service to ${IMAGE_TAG} [skip ci]"
          git push

      - name: Deployment summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | prod |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.vars.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | ${{ steps.push.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY
